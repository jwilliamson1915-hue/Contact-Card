<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jason Williamson — Red Arrow Clothing</title>
  <meta name="description" content="Save Jason Williamson's contact info from Red Arrow Clothing.">

  <!-- vCard auto-download -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #C01C1C;
      --dark:   #0E0E0E;
      --mid:    #1A1A1A;
      --muted:  #888888;
      --light:  #F2F2F2;
      --white:  #FFFFFF;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--dark);
      color: var(--light);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* Arrow SVG mark */
    .arrow-mark {
      width: 56px;
      height: 56px;
      margin-bottom: 1.5rem;
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 8vw, 4rem);
      letter-spacing: 0.08em;
      color: var(--white);
      line-height: 1;
      text-align: center;
    }

    .brand span {
      color: var(--red);
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--red);
      margin: 1.4rem auto;
    }

    .name {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--light);
      text-align: center;
    }

    .contact-list {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
      max-width: 320px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
    }

    .contact-item svg {
      flex-shrink: 0;
      color: var(--red);
    }

    .contact-item a {
      color: var(--light);
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact-item a:hover { color: var(--red); }

    /* Download button */
    .btn {
      margin-top: 2.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      background: var(--red);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.85rem 2rem;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn:hover {
      background: #a01818;
      transform: translateY(-1px);
    }

    .hint {
      margin-top: 1rem;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      max-width: 260px;
      line-height: 1.6;
    }

    footer {
      margin-top: 3.5rem;
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

      <a href="https://www.redarrowclothing.com" target="_blank" rel="noopener">redarrowclothing.com</a>

  </div>

  <a class="btn" href="jason-williamson.vcf" download="jason-williamson.vcf">
    <!-- Download icon -->
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Save Contact

</html>
